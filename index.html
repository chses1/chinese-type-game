<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>地球保衛戰</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="chip">👨‍🎓 <span id="userChip">未登入</span></div>
  <div class="chip">分數 <b id="score">0</b></div>
  <div class="chip">時間 <b id="time">60</b>s</div>
  <div class="chip">接關次數 <b id="lives">❤️❤️❤️</b></div>
  <div class="chip" id="chipHint">關卡：第 1 關｜新兵試煉</div>
</header>

<div id="gameWrap">
  <canvas id="gameCanvas" width="1280" height="720"></canvas>
</div>

<!-- 置中彈窗版本的排行榜 -->
<div id="leader" hidden>
  <div class="leaderCard">
    <div class="leaderTitleRow">
      <div class="leaderTitleMain">
        <h2 id="leaderTitle">排行榜</h2>
        <div class="leaderModeSwitch">
          <button id="btnClassLeader" class="tag active" type="button">本班排行</button>
          <button id="btnGlobalLeader" class="tag" type="button">全部排行</button>
        </div>
      </div>
      <div id="leaderMeta" class="leaderMeta leaderTitleSide">載入中…</div>
    </div>
    <div class="leaderTableWrap">
      <table>
        <thead><tr><th>名次</th><th>學號</th><th>最佳</th><th>關卡</th></tr></thead>
        <tbody id="leaderBody"></tbody>
      </table>
    </div>
    <div style="margin-top:12px;display:flex;gap:10px;justify-content:center">
      <button id="btnRestartGame" class="tag">重新開始</button>
      <button id="btnCloseLeader" class="tag">結束</button>
    </div>
  </div>
</div>


<div id="classroomOverlay" hidden style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);z-index:35">
  <div style="width:min(520px,92vw);background:rgba(12,30,66,.92);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:24px;text-align:center;backdrop-filter:blur(8px)">
    <h2 id="classroomTitle" style="margin:0 0 10px;color:#ffd54a">班級競賽模式</h2>
    <div id="classroomMsg" style="font-size:24px;font-weight:700">等待老師開始…</div>
    <div id="classroomSub" style="margin-top:10px;opacity:.85">老師按下開始後，全班會同步倒數。</div>
  </div>
</div>

<div id="modeChip" class="chip" style="position:fixed;right:12px;top:58px;z-index:6;display:none">模式：自由練習</div>

<div id="kbd"></div>


<!-- Result Modal -->
<div id="resultBox">
  <div id="resultCard" class="resultThemeFail">
    <div class="resultGlow"></div>
    <div class="resultHeader">
      <div class="resultEyebrow">MISSION REPORT</div>
      <h2>🌍 地球防衛戰報告</h2>
      <div id="resultOutcome" class="resultOutcome">本回合結算完成</div>
    </div>

    <div class="resultHeroRow">
      <div class="resultGradeWrap">
        <div id="resGrade" class="resultGrade">B</div>
        <div class="resultGradeLabel">任務評級</div>
      </div>
      <div class="resultTitleWrap">
        <div id="resTitle" class="resultTitle">🛰️ 偵察員</div>
        <div id="resTitleDesc" class="resultTitleDesc">持續練習，守住地球！</div>
        <div id="resProgressText" class="resultProgressText">距離下一級還差一點</div>
      </div>
    </div>

    <div class="resultStatsGrid">
      <div class="resultStatCard good">
        <div class="resultStatLabel">☄️ 擊落隕石</div>
        <div id="resCorrect" class="resultStatValue">0</div>
      </div>
      <div class="resultStatCard bad">
        <div class="resultStatLabel">💥 漏掉隕石</div>
        <div id="resWrong" class="resultStatValue">0</div>
      </div>
      <div class="resultStatCard acc">
        <div class="resultStatLabel">🎯 命中率</div>
        <div id="resAcc" class="resultStatValue">0%</div>
      </div>
      <div class="resultStatCard speed">
        <div class="resultStatLabel">⚡ 反應速度</div>
        <div><span id="resSpeed" class="resultStatValue">0</span><span class="resultStatUnit"> 字/分</span></div>
      </div>
    </div>

    <div class="resultDefensePanel">
      <div class="resultDefenseHead">
        <span>🛡️ 地球防衛狀態</span>
        <span id="resShield">0%</span>
      </div>
      <div class="resultDefenseBar"><div id="resShieldFill" class="resultDefenseFill"></div></div>
      <div id="resPromo" class="resultDefenseNote">—</div>
    </div>

    <div id="resMissionSummary" class="resultMissionSummary"></div>

    <button id="resultPrimaryBtn" class="primary resultActionBtn">再玩一次</button>
  </div>
</div>

<!-- Login / teacher modal-->
<div id="login">
  <div id="card" class="loginCard">
    <h1 class="loginTitle">地球保衛戰</h1>
    <p class="loginSubtitle">開始遊戲後，點擊下方注音鍵，擊落相同符號的隕石。</p>
    <div class="loginField">
      <label for="sid" class="loginLabel">登入請輸入學號 5 碼數字</label>
      <input id="sid" class="loginInput" placeholder="例如：30130" inputmode="numeric" maxlength="5" />
      </div>

    <div class="rowBtns loginBtns">
      <button id="go" class="primary loginMainBtn">開始登入</button>
      <a id="teacherOpen" class="tag loginSubBtn" href="/teacher">教師後台</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="main.js"></script>
</body>
</html>
